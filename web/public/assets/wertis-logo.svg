  <!-- tagline z pomarańczowymi kreskami po bokach -->
  <g>
    <rect x="72" y="99" width="26" height="3.5" rx="1.75" fill="#F7A600"/>
    <text x="180" y="108" text-anchor="middle" font-family="'Barlow',sans-serif"
