    <g fill="#F7A600">
      <g>
        <rect x="201" y="4" width="8" height="12" rx="2"/>
        <rect x="201" y="4" width="8" height="12" rx="2" transform="rotate(30 205 32)"/>
        <rect x="201" y="4" width="8" height="12" rx="2" transform="rotate(60 205 32)"/>
        <rect x="201" y="4" width="8" height="12" rx="2" transform="rotate(90 205 32)"/>
