        <rect x="201" y="4" width="8" height="12" rx="2" transform="rotate(180 205 32)"/>
        <rect x="201" y="4" width="8" height="12" rx="2" transform="rotate(210 205 32)"/>
        <rect x="201" y="4" width="8" height="12" rx="2" transform="rotate(240 205 32)"/>
