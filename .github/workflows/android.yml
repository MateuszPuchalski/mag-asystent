# Build natywnej aplikacji Android (android/). Środowiska bez Android SDK
# budują tylko :core (testy JVM) — pełny build APK wymaga SDK, który jest
# preinstalowany na runnerach ubuntu-latest.
name: Android

on:
  push:
    branches: [main]
    paths: ["android/**", ".github/workflows/android.yml"]
  pull_request:
    paths: ["android/**", ".github/workflows/android.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Testy :core (JVM)
        run: ./gradlew :core:test
      - name: Testy jednostkowe + APK debug
        run: ./gradlew :app:testDebugUnitTest :app:assembleDebug
      - name: Artefakt APK
        uses: actions/upload-artifact@v4
        with:
          name: wertis-kolektor-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
